<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Closi AI · Sandbox</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;700;800&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0a14;--surface:#17112a;--surface2:#1f1636;--purple:#8b3fbb;--purple-light:#b06fe0;--purple-glow:rgba(139,63,187,0.25);--orange:#e07b39;--orange-glow:rgba(224,123,57,0.2);--text:#f0eaf8;--text-dim:#8b80a8;--border:rgba(139,63,187,0.2);--bubble-agent:#1f1636;--bubble-user:#2d1f52;--green:#4caf80}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
body::before{content:'';position:fixed;top:-30%;left:-10%;width:60%;height:60%;background:radial-gradient(ellipse,rgba(139,63,187,0.12) 0%,transparent 70%);pointer-events:none;z-index:0}
header{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);background:rgba(13,10,20,0.8);backdrop-filter:blur(12px)}
.logo{display:flex;align-items:center;gap:12px}
.logo-blob{width:38px;height:38px}
.logo-blob svg{width:100%;height:100%;filter:drop-shadow(0 0 8px var(--purple))}
.logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;letter-spacing:-0.5px}
.logo-text span{color:var(--purple-light)}
.sandbox-badge{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--orange);background:var(--orange-glow);border:1px solid rgba(224,123,57,0.3);padding:3px 10px;border-radius:20px}
.header-actions{display:flex;align-items:center;gap:12px}
.status-dot{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-dim)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse-dot 2s infinite}
.dot.escalated{background:var(--orange);box-shadow:0 0 6px var(--orange)}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:0.4}}
button.reset-btn{background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:6px 14px;border-radius:20px;font-size:12px;font-family:'Space Grotesk',sans-serif;cursor:pointer;transition:all 0.2s}
button.reset-btn:hover{border-color:var(--purple);color:var(--purple-light)}
#chat{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;position:relative;z-index:1;scroll-behavior:smooth}
#chat::-webkit-scrollbar{width:4px}
#chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.message{display:flex;gap:10px;max-width:80%;animation:fadeUp 0.3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.message.agent{align-self:flex-start}
.message.user{align-self:flex-end;flex-direction:row-reverse}
.avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.avatar.agent-av{background:var(--surface2);border:1px solid var(--border)}
.avatar.user-av{background:rgba(139,63,187,0.15);border:1px solid rgba(139,63,187,0.3);font-size:13px;color:var(--purple-light);font-weight:600}
.bubble{padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.6;white-space:pre-wrap}
.message.agent .bubble{background:var(--bubble-agent);border:1px solid var(--border);border-top-left-radius:4px}
.message.user .bubble{background:var(--bubble-user);border:1px solid rgba(139,63,187,0.3);border-top-right-radius:4px}
.message-meta{font-size:10px;color:var(--text-dim);margin-top:4px;padding:0 4px}
.message.user .message-meta{text-align:right}
.escalation-alert{background:rgba(224,123,57,0.1);border:1px solid rgba(224,123,57,0.3);border-radius:12px;padding:12px 16px;font-size:13px;color:var(--orange);text-align:center}

/* ── Typing animation: mini Closi AI pulando ── */
.typing{display:flex;gap:10px;align-items:center}
.typing-blobs{display:flex;gap:6px;padding:12px 16px;background:var(--bubble-agent);border:1px solid var(--border);border-radius:16px;border-top-left-radius:4px;align-items:flex-end;min-height:46px}
.c-blob{animation:blob-jump 1.4s ease-in-out infinite;transform-origin:bottom center}
.c-blob:nth-child(2){animation-delay:0.22s}
.c-blob:nth-child(3){animation-delay:0.44s}
@keyframes blob-jump{
  0%,55%,100%{transform:translateY(0) scaleX(1) scaleY(1)}
  25%{transform:translateY(-10px) scaleX(0.92) scaleY(1.08)}
  45%{transform:translateY(-2px) scaleX(1.06) scaleY(0.94)}
}

footer{position:relative;z-index:10;padding:16px 24px 20px;border-top:1px solid var(--border);background:rgba(13,10,20,0.9);backdrop-filter:blur(12px)}
.vertical-hint{font-size:11px;color:var(--text-dim);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.vertical-tag{background:var(--purple-glow);border:1px solid rgba(139,63,187,0.3);color:var(--purple-light);padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
.input-row{display:flex;gap:10px;align-items:flex-end}
textarea{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 16px;font-size:14px;font-family:'Space Grotesk',sans-serif;color:var(--text);resize:none;min-height:48px;max-height:140px;line-height:1.5;transition:border-color 0.2s;outline:none}
textarea::placeholder{color:var(--text-dim)}
textarea:focus{border-color:var(--purple)}
.send-btn{width:48px;height:48px;border-radius:14px;background:var(--purple);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0}
.send-btn:hover{background:var(--purple-light);transform:scale(1.05)}
.send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.send-btn svg{width:18px;height:18px;fill:white}
.welcome{text-align:center;padding:60px 20px}
.welcome-blob{width:80px;height:80px;margin:0 auto 28px;filter:drop-shadow(0 0 24px rgba(139,63,187,0.7))}
.welcome-title{margin-bottom:14px;line-height:1.1}
.welcome-title .line1{display:block;font-family:'Playfair Display',serif;font-weight:400;font-size:28px;letter-spacing:0.5px;color:var(--text-dim)}
.welcome-title .line2{display:block;font-family:'Playfair Display',serif;font-weight:900;font-size:36px;letter-spacing:-0.5px;background:linear-gradient(135deg,#c084f5 0%,#8b3fbb 50%,#e07b39 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.welcome p{color:var(--text-dim);font-size:13px;white-space:nowrap;margin:0 auto 28px;letter-spacing:0.2px}
.quick-messages{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.quick-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-dim);padding:8px 14px;border-radius:20px;font-size:13px;font-family:'Space Grotesk',sans-serif;cursor:pointer;transition:all 0.2s}
.quick-btn:hover{border-color:var(--purple);color:var(--purple-light);background:var(--purple-glow)}
.agent-name-tag{font-size:11px;color:var(--purple-light);margin-bottom:2px;padding-left:2px;font-weight:500}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-blob">
      <svg viewBox="0 0 40 40" fill="none"><path d="M20 4C14 4 6 9 5 18C4 27 10 36 20 36C30 36 36 27 35 18C34 9 26 4 20 4Z" fill="#8b3fbb" opacity="0.9"/><circle cx="14" cy="17" r="3.5" fill="white"/><circle cx="26" cy="17" r="3.5" fill="white"/><circle cx="15" cy="16" r="1.5" fill="#1a0a2e"/><circle cx="27" cy="16" r="1.5" fill="#1a0a2e"/><path d="M15 24 Q20 28 25 24" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/><circle cx="10" cy="12" r="2" fill="#b06fe0" opacity="0.7"/><circle cx="31" cy="10" r="1.5" fill="#e07b39" opacity="0.8"/></svg>
    </div>
    <div class="logo-text">Closi<span>AI</span></div>
  </div>
  <div class="header-actions">
    <div class="status-dot"><div class="dot" id="statusDot"></div><span id="statusText">Agente ativo</span></div>
    <button class="reset-btn" onclick="resetChat()">↺ Nova conversa</button>
  </div>
</header>
<div id="chat">
  <div class="welcome" id="welcome">
    <svg class="welcome-blob" viewBox="0 0 80 80" fill="none">
      <path d="M40 8C28 8 12 18 10 36C8 54 20 72 40 72C60 72 72 54 70 36C68 18 52 8 40 8Z" fill="#8b3fbb" opacity="0.85"/>
      <ellipse cx="40" cy="24" rx="18" ry="10" fill="#b06fe0" opacity="0.3"/>
      <circle cx="28" cy="34" r="7" fill="white"/>
      <circle cx="52" cy="34" r="7" fill="white"/>
      <circle cx="30" cy="32" r="3" fill="#1a0a2e"/>
      <circle cx="54" cy="32" r="3" fill="#1a0a2e"/>
      <circle cx="31.5" cy="30.5" r="1" fill="white" opacity="0.7"/>
      <circle cx="55.5" cy="30.5" r="1" fill="white" opacity="0.7"/>
      <path d="M30 48 Q40 56 50 48" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    </svg>
    <h2 class="welcome-title">
      <span class="line1">Agente de Vendas</span>
      <span class="line2">da MED-Review</span>
    </h2>
    <p>Simule uma conversa como se você fosse um lead da MedReview.</p>
    <div class="quick-messages">
      <button class="quick-btn" onclick="sendQuick('Oi, vi um anúncio do R1 e quero saber mais')">Oi, vi um anúncio do R1</button>
      <button class="quick-btn" onclick="sendQuick('Quanto custa o curso de residência?')">Quanto custa?</button>
      <button class="quick-btn" onclick="sendQuick('Tem desconto?')">Tem desconto?</button>
      <button class="quick-btn" onclick="sendQuick('Qual é a diferença dos planos?')">Diferença dos planos</button>
    </div>
  </div>
</div>
<footer>
  <div class="vertical-hint">Simulando vertical: <span class="vertical-tag">R1 · Residência Médica</span><span style="margin-left:auto;font-size:10px;">Enter para enviar · Shift+Enter para quebrar linha</span></div>
  <div class="input-row">
    <textarea id="input" placeholder="Digite como se fosse um lead médico..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()"><svg viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2z"/></svg></button>
  </div>
</footer>

<!-- SVG mini-blob reutilizável via template -->
<template id="blob-svg">
  <svg class="c-blob" width="24" height="26" viewBox="0 0 24 26" fill="none">
    <path d="M12 2C8 2 2 6 2 13C2 20 6.5 24 12 24C17.5 24 22 20 22 13C22 6 16 2 12 2Z" fill="#8b3fbb"/>
    <ellipse cx="12" cy="8" rx="7" ry="3.5" fill="#b06fe0" opacity="0.35"/>
    <circle cx="8.5" cy="13" r="2.8" fill="white"/>
    <circle cx="15.5" cy="13" r="2.8" fill="white"/>
    <circle cx="9.3" cy="12.2" r="1.2" fill="#1a0a2e"/>
    <circle cx="16.3" cy="12.2" r="1.2" fill="#1a0a2e"/>
    <circle cx="9.9" cy="11.5" r="0.5" fill="white" opacity="0.8"/>
    <circle cx="16.9" cy="11.5" r="0.5" fill="white" opacity="0.8"/>
  </svg>
</template>

<script>
const AGENT_NAME = Math.random() < 0.5 ? 'Pedro' : 'Sofia';
const chatEl=document.getElementById('chat'),inputEl=document.getElementById('input'),sendBtn=document.getElementById('sendBtn'),statusDot=document.getElementById('statusDot'),statusText=document.getElementById('statusText');
let isFirst=true;

inputEl.addEventListener('input',()=>{inputEl.style.height='auto';inputEl.style.height=Math.min(inputEl.scrollHeight,140)+'px'});
inputEl.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}});
function sendQuick(t){inputEl.value=t;sendMessage()}
function getTime(){return new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}

function makeBlobSvg(){
  const t=document.getElementById('blob-svg');
  return t.content.cloneNode(true).querySelector('svg');
}

function appendMessage(role,text){
  const msg=document.createElement('div');msg.className=`message ${role}`;
  const av=document.createElement('div');av.className=`avatar ${role==='agent'?'agent-av':'user-av'}`;
  av.innerHTML=role==='agent'
    ?`<svg width="20" height="22" viewBox="0 0 24 26" fill="none"><path d="M12 2C8 2 2 6 2 13C2 20 6.5 24 12 24C17.5 24 22 20 22 13C22 6 16 2 12 2Z" fill="#8b3fbb"/><circle cx="8.5" cy="13" r="2.5" fill="white"/><circle cx="15.5" cy="13" r="2.5" fill="white"/><circle cx="9.2" cy="12.3" r="1.1" fill="#1a0a2e"/><circle cx="16.2" cy="12.3" r="1.1" fill="#1a0a2e"/></svg>`
    :'Eu';
  const content=document.createElement('div');
  if(role==='agent'){
    const nameTag=document.createElement('div');
    nameTag.className='agent-name-tag';
    nameTag.textContent=AGENT_NAME;
    content.appendChild(nameTag);
  }
  const bubble=document.createElement('div');bubble.className='bubble';bubble.textContent=text;
  const meta=document.createElement('div');meta.className='message-meta';meta.textContent=getTime();
  content.appendChild(bubble);content.appendChild(meta);
  msg.appendChild(av);msg.appendChild(content);
  chatEl.appendChild(msg);chatEl.scrollTop=chatEl.scrollHeight;
}

function showTyping(){
  const t=document.createElement('div');t.className='typing';t.id='typing';
  const av=document.createElement('div');av.className='avatar agent-av';
  av.innerHTML=`<svg width="20" height="22" viewBox="0 0 24 26" fill="none"><path d="M12 2C8 2 2 6 2 13C2 20 6.5 24 12 24C17.5 24 22 20 22 13C22 6 16 2 12 2Z" fill="#8b3fbb"/><circle cx="8.5" cy="13" r="2.5" fill="white"/><circle cx="15.5" cy="13" r="2.5" fill="white"/></svg>`;
  const blobs=document.createElement('div');blobs.className='typing-blobs';
  blobs.appendChild(makeBlobSvg());
  blobs.appendChild(makeBlobSvg());
  blobs.appendChild(makeBlobSvg());
  t.appendChild(av);t.appendChild(blobs);
  chatEl.appendChild(t);chatEl.scrollTop=chatEl.scrollHeight;
}
function hideTyping(){const t=document.getElementById('typing');if(t)t.remove()}

// ── Cada mensagem é um POST separado (simula WhatsApp real) ──────────────────
// O debounce/acumulação acontece no BACKEND, não aqui.
// O frontend envia cada mensagem imediatamente e aguarda o backend processar.
// Se o user mandar 2 msgs rápidas, o backend acumula e responde uma vez só.
// A primeira requisição fica bloqueada esperando; a segunda atualiza o timer.
// Quando o timer do backend expira, todas as threads recebem a mesma resposta.

let _activeSends=0;  // Quantas requisições estão em andamento
let _responded=false; // Evita renderizar resposta duplicada de requests concorrentes

async function sendMessage(){
  const text=inputEl.value.trim();if(!text)return;
  if(isFirst){document.getElementById('welcome')?.remove();isFirst=false}
  appendMessage('user',text);inputEl.value='';inputEl.style.height='auto';

  _activeSends++;
  if(_activeSends===1){showTyping();_responded=false;}

  try{
    const res=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,session_id:'sandbox'})});
    if(!res.ok){
      const errData=await res.json().catch(()=>({}));
      throw new Error(errData.error||`Servidor retornou ${res.status}`);
    }
    const data=await res.json();

    // Só renderiza a resposta uma vez (a primeira requisição que retornar)
    if(!_responded && data.status!=='queued'){
      _responded=true;hideTyping();
      const msgs=data.responses||data.messages||[data.response||data.message];
      const delay=(data.delay_seconds||3)*1000;
      for(let i=0;i<msgs.length;i++){
        if(i>0){showTyping();await new Promise(r=>setTimeout(r,delay));hideTyping();}
        appendMessage('agent',msgs[i]);
      }
      if(data.escalate){statusDot.className='dot escalated';statusText.textContent='Escalando para humano'}
    }
  }catch(e){
    if(!_responded){
      _responded=true;hideTyping();
      const isNetwork = e.name==='TypeError' || /fetch/i.test(e.message||'');
      const msg = isNetwork ? 'Conexão interrompida. Tenta mandar de novo?' : 'Erro: '+(e.message||'conexão falhou');
      appendMessage('agent', msg);
    }
  }

  _activeSends--;
  if(_activeSends===0){sendBtn.disabled=false;inputEl.focus();}
}

async function resetChat(){
  await fetch('/reset',{method:'POST'});chatEl.innerHTML='';isFirst=true;
  statusDot.className='dot';statusText.textContent='Agente ativo';
  const w=document.createElement('div');w.className='welcome';w.id='welcome';
  w.innerHTML=`<svg class="welcome-blob" viewBox="0 0 80 80" fill="none"><path d="M40 8C28 8 12 18 10 36C8 54 20 72 40 72C60 72 72 54 70 36C68 18 52 8 40 8Z" fill="#8b3fbb" opacity="0.85"/><circle cx="28" cy="34" r="7" fill="white"/><circle cx="52" cy="34" r="7" fill="white"/><circle cx="30" cy="32" r="3" fill="#1a0a2e"/><circle cx="54" cy="32" r="3" fill="#1a0a2e"/><path d="M30 48 Q40 56 50 48" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/></svg><h2 style="font-family:Syne,sans-serif;font-weight:800">Nova conversa</h2><p style="color:var(--text-dim);margin-top:8px">Comece como lead médico.</p>`;
  chatEl.appendChild(w);
}
inputEl.focus();
</script>
</body>
</html>

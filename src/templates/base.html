<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criatons · {% block title %}Dashboard{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/shared.css') }}">
<style>
:root {
  --bg: #0d0a14;
  --surface: #17112a;
  --surface2: #1f1636;
  --sidebar-bg: #0a0810;
  --purple: #8b3fbb;
  --purple-light: #b06fe0;
  --purple-glow: rgba(139,63,187,0.25);
  --orange: #e07b39;
  --orange-glow: rgba(224,123,57,0.2);
  --text: #f0eaf8;
  --text-dim: #8b80a8;
  --border: rgba(139,63,187,0.15);
  --green: #4caf80;
  --red: #e05555;
  --yellow: #e0c340;
  --sidebar-w: 250px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Space Grotesk',sans-serif; height:100vh; overflow:hidden; }

/* ── Layout ── */
.app-layout { display:flex; height:100vh; }

/* ── Sidebar ── */
.sidebar {
  width:var(--sidebar-w); min-width:var(--sidebar-w);
  background:var(--sidebar-bg);
  border-right:1px solid var(--border);
  display:flex; flex-direction:column;
  z-index:100;
}
.sidebar-logo {
  padding:20px 18px;
  display:flex; align-items:center; gap:10px;
  border-bottom:1px solid var(--border);
}
.sidebar-logo svg { width:32px; height:32px; filter:drop-shadow(0 0 8px var(--purple)); flex-shrink:0; }
.sidebar-logo .logo-text { font-family:'Syne',sans-serif; font-weight:800; font-size:19px; letter-spacing:-0.5px; }
.sidebar-logo .logo-text span { color:var(--purple-light); }

.sidebar-nav { flex:1; padding:14px 0; overflow-y:auto; }
.sidebar-nav::-webkit-scrollbar { width:3px; }
.sidebar-nav::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

.nav-label {
  padding:10px 18px 6px;
  font-size:9px; font-weight:600; letter-spacing:2px;
  text-transform:uppercase; color:var(--text-dim); opacity:0.5;
}
.nav-item {
  display:flex; align-items:center; gap:11px;
  padding:9px 18px; margin:1px 8px; border-radius:8px;
  color:var(--text-dim); text-decoration:none;
  font-size:13.5px; font-weight:400;
  transition:all 0.15s; cursor:pointer;
}
.nav-item:hover { background:rgba(139,63,187,0.08); color:var(--text); }
.nav-item.active {
  background:rgba(139,63,187,0.14);
  color:var(--purple-light); font-weight:500;
}
.nav-item svg { width:18px; height:18px; flex-shrink:0; opacity:0.6; }
.nav-item.active svg { opacity:1; }

.nav-badge {
  margin-left:auto; font-size:10px; font-weight:600;
  background:rgba(139,63,187,0.2); color:var(--purple-light);
  padding:1px 7px; border-radius:10px; min-width:20px; text-align:center;
}

.sidebar-footer {
  padding:14px 18px; border-top:1px solid var(--border);
  font-size:10px; color:var(--text-dim); opacity:0.4;
}

/* ── Content area ── */
.content-area {
  flex:1; display:flex; flex-direction:column;
  overflow:hidden; position:relative;
}
.content-area::before {
  content:''; position:fixed;
  top:-30%; left:calc(var(--sidebar-w));
  width:50%; height:50%;
  background:radial-gradient(ellipse,rgba(139,63,187,0.07) 0%,transparent 70%);
  pointer-events:none; z-index:0;
}

/* ── Page header (shared) ── */
.page-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 24px;
  border-bottom:1px solid var(--border);
  background:rgba(13,10,20,0.8);
  backdrop-filter:blur(12px);
  position:relative; z-index:10;
}
.page-title { display:flex; align-items:center; gap:10px; }
.page-title h1 { font-family:'Syne',sans-serif; font-weight:700; font-size:17px; letter-spacing:-0.3px; }
.page-badge {
  font-size:9px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase;
  padding:3px 9px; border-radius:12px;
}
.page-badge.orange { color:var(--orange); background:var(--orange-glow); border:1px solid rgba(224,123,57,0.25); }
.page-badge.green  { color:var(--green);  background:rgba(76,175,128,0.12); border:1px solid rgba(76,175,128,0.25); }
.page-badge.purple { color:var(--purple-light); background:var(--purple-glow); border:1px solid rgba(139,63,187,0.25); }

.page-actions { display:flex; align-items:center; gap:10px; }

/* ── Shared button styles ── */
.btn-ghost {
  background:transparent; border:1px solid var(--border);
  color:var(--text-dim); padding:6px 14px; border-radius:8px;
  font-size:12px; font-family:'Space Grotesk',sans-serif;
  cursor:pointer; transition:all 0.15s;
}
.btn-ghost:hover { border-color:var(--purple); color:var(--purple-light); }

.btn-primary {
  background:var(--purple); border:none;
  color:white; padding:7px 16px; border-radius:8px;
  font-size:12px; font-family:'Space Grotesk',sans-serif;
  cursor:pointer; transition:all 0.15s;
}
.btn-primary:hover { background:var(--purple-light); }

/* ── Placeholder page ── */
.placeholder-page {
  flex:1; display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:16px; opacity:0.5;
}
.placeholder-page svg { width:48px; height:48px; stroke:var(--purple-light); }
.placeholder-page p { font-size:14px; color:var(--text-dim); }

{% block extra_styles %}{% endblock %}
</style>
</head>
<body>
<div class="app-layout">
  <!-- ── Sidebar ── -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      <svg viewBox="0 0 40 40" fill="none">
        <path d="M20 4C14 4 6 9 5 18C4 27 10 36 20 36C30 36 36 27 35 18C34 9 26 4 20 4Z" fill="#8b3fbb" opacity="0.9"/>
        <circle cx="14" cy="17" r="3.5" fill="white"/><circle cx="26" cy="17" r="3.5" fill="white"/>
        <circle cx="15" cy="16" r="1.5" fill="#1a0a2e"/><circle cx="27" cy="16" r="1.5" fill="#1a0a2e"/>
        <path d="M15 24 Q20 28 25 24" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        <circle cx="10" cy="12" r="2" fill="#b06fe0" opacity="0.7"/>
        <circle cx="31" cy="10" r="1.5" fill="#e07b39" opacity="0.8"/>
      </svg>
      <div class="logo-text">Cria<span>tons</span></div>
    </div>

    <div class="sidebar-nav">
      <div class="nav-label">Operação</div>

      <a href="/dashboard/sandbox" class="nav-item {% if active_page == 'sandbox' %}active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        Sandbox
      </a>

      <a href="/dashboard/conversations" class="nav-item {% if active_page == 'conversations' %}active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
        </svg>
        Conversas
      </a>

      <a href="/dashboard/corrections" class="nav-item {% if active_page == 'corrections' %}active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          <path d="M9 12l2 2 4-4"/>
        </svg>
        Correções
      </a>

      <a href="/dashboard/analytics" class="nav-item {% if active_page == 'analytics' %}active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.21 15.89A10 10 0 1 1 8 2.83"/>
          <path d="M22 12A10 10 0 0 0 12 2v10z"/>
        </svg>
        Analytics
      </a>

      <div class="nav-label" style="margin-top:14px">Sistema</div>

      <a href="/dashboard/costs" class="nav-item {% if active_page == 'costs' %}active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="18" y="3" width="4" height="18" rx="1"/>
          <rect x="10" y="8" width="4" height="13" rx="1"/>
          <rect x="2" y="13" width="4" height="8" rx="1"/>
        </svg>
        Custos &amp; Modelo
      </a>

      <a href="/dashboard/logs" class="nav-item {% if active_page == 'logs' %}active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="4 17 10 11 4 5"/>
          <line x1="12" y1="19" x2="20" y2="19"/>
        </svg>
        Logs
      </a>
    </div>

    <div class="sidebar-footer">Criatons v1.0 · MedReview</div>
  </nav>

  <!-- ── Content ── -->
  <main class="content-area">
    {% block content %}{% endblock %}
  </main>
</div>

{% block scripts %}{% endblock %}
</body>
</html>
